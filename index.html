<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeuomorphic 88-Key Piano</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <div class="piano-casing">
        <div class="felt-strip"></div>
        <div class="keyboard">
            <!-- A0 to B0 -->
            <div class="key white" id="A0"></div>
            <div class="key black" id="Bb0"></div>
            <div class="key white" id="B0"></div>
            
            <!-- Octave 1 -->
            <div class="key white" id="C1"></div>
            <div class="key black" id="Db1"></div>
            <div class="key white" id="D1"></div>
            <div class="key black" id="Eb1"></div>
            <div class="key white" id="E1"></div>
            <div class="key white" id="F1"></div>
            <div class="key black" id="Gb1"></div>
            <div class="key white" id="G1"></div>
            <div class="key black" id="Ab1"></div>
            <div class="key white" id="A1"></div>
            <div class="key black" id="Bb1"></div>
            <div class="key white" id="B1"></div>
            
            <!-- Octave 2 -->
            <div class="key white" id="C2"></div>
            <div class="key black" id="Db2"></div>
            <div class="key white" id="D2"></div>
            <div class="key black" id="Eb2"></div>
            <div class="key white" id="E2"></div>
            <div class="key white" id="F2"></div>
            <div class="key black" id="Gb2"></div>
            <div class="key white" id="G2"></div>
            <div class="key black" id="Ab2"></div>
            <div class="key white" id="A2"></div>
            <div class="key black" id="Bb2"></div>
            <div class="key white" id="B2"></div>
            
            <!-- Octave 3 -->
            <div class="key white" id="C3"></div>
            <div class="key black" id="Db3"></div>
            <div class="key white" id="D3"></div>
            <div class="key black" id="Eb3"></div>
            <div class="key white" id="E3"></div>
            <div class="key white" id="F3"></div>
            <div class="key black" id="Gb3"></div>
            <div class="key white" id="G3"></div>
            <div class="key black" id="Ab3"></div>
            <div class="key white" id="A3"></div>
            <div class="key black" id="Bb3"></div>
            <div class="key white" id="B3"></div>
            
            <!-- Octave 4 (Middle C) -->
            <div class="key white" id="C4"></div>
            <div class="key black" id="Db4"></div>
            <div class="key white" id="D4"></div>
            <div class="key black" id="Eb4"></div>
            <div class="key white" id="E4"></div>
            <div class="key white" id="F4"></div>
            <div class="key black" id="Gb4"></div>
            <div class="key white" id="G4"></div>
            <div class="key black" id="Ab4"></div>
            <div class="key white" id="A4"></div>
            <div class="key black" id="Bb4"></div>
            <div class="key white" id="B4"></div>
            
            <!-- Octave 5 -->
            <div class="key white" id="C5"></div>
            <div class="key black" id="Db5"></div>
            <div class="key white" id="D5"></div>
            <div class="key black" id="Eb5"></div>
            <div class="key white" id="E5"></div>
            <div class="key white" id="F5"></div>
            <div class="key black" id="Gb5"></div>
            <div class="key white" id="G5"></div>
            <div class="key black" id="Ab5"></div>
            <div class="key white" id="A5"></div>
            <div class="key black" id="Bb5"></div>
            <div class="key white" id="B5"></div>
            
            <!-- Octave 6 -->
            <div class="key white" id="C6"></div>
            <div class="key black" id="Db6"></div>
            <div class="key white" id="D6"></div>
            <div class="key black" id="Eb6"></div>
            <div class="key white" id="E6"></div>
            <div class="key white" id="F6"></div>
            <div class="key black" id="Gb6"></div>
            <div class="key white" id="G6"></div>
            <div class="key black" id="Ab6"></div>
            <div class="key white" id="A6"></div>
            <div class="key black" id="Bb6"></div>
            <div class="key white" id="B6"></div>
            
            <!-- Octave 7 -->
            <div class="key white" id="C7"></div>
            <div class="key black" id="Db7"></div>
            <div class="key white" id="D7"></div>
            <div class="key black" id="Eb7"></div>
            <div class="key white" id="E7"></div>
            <div class="key white" id="F7"></div>
            <div class="key black" id="Gb7"></div>
            <div class="key white" id="G7"></div>
            <div class="key black" id="Ab7"></div>
            <div class="key white" id="A7"></div>
            <div class="key black" id="Bb7"></div>
            <div class="key white" id="B7"></div>
            
            <!-- Final C -->
            <div class="key white" id="C8"></div>
        </div>
    </div>
    
</body>
<script src="main.js"></script>

</html>
